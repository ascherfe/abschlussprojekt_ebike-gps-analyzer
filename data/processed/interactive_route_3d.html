grad: 47.581830<br>L\u00e4ngengrad: 12.170470<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:53:42.379Z<br>Temperatur: 25.8 \u00b0C", "Punkt: 2278<br>Breitengrad: 47.582030<br>L\u00e4ngengrad: 12.170510<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:53:46.121Z<br>Temperatur: 26.3 \u00b0C", "Punkt: 2279<br>Breitengrad: 47.582150<br>L\u00e4ngengrad: 12.170530<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:53:48.359Z<br>Temperatur: 25.1 \u00b0C", "Punkt: 2280<br>Breitengrad: 47.582370<br>L\u00e4ngengrad: 12.170590<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:53:52.504Z<br>Temperatur: 24.7 \u00b0C", "Punkt: 2281<br>Breitengrad: 47.582700<br>L\u00e4ngengrad: 12.170700<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:53:58.774Z<br>Temperatur: 24.8 \u00b0C", "Punkt: 2282<br>Breitengrad: 47.582820<br>L\u00e4ngengrad: 12.170730<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:54:01.030Z<br>Temperatur: 24.9 \u00b0C", "Punkt: 2283<br>Breitengrad: 47.582910<br>L\u00e4ngengrad: 12.170760<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:54:02.739Z<br>Temperatur: 24.3 \u00b0C", "Punkt: 2284<br>Breitengrad: 47.583110<br>L\u00e4ngengrad: 12.170840<br>H\u00f6he: 493.64 m<br>Zeit: 2024-08-23T20:54:06.578Z<br>Temperatur: 25.4 \u00b0C"];
        const verticalExaggeration = 5;

        const map = L.map("map").setView(
            [47.537318364711034, 12.057738450963223],
            14
        );

        L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                maxZoom: 19,
                attribution: "&copy; OpenStreetMap"
            }
        ).addTo(map);

        const routeCoordinates = latitudes.map(
            (latitude, index) => [
                latitude,
                longitudes[index]
            ]
        );

        const routeLine = L.polyline(
            routeCoordinates,
            {
                weight: 5
            }
        ).addTo(map);

        map.fitBounds(routeLine.getBounds());

        L.marker(routeCoordinates[0])
            .addTo(map)
            .bindPopup("Startpunkt");

        L.marker(routeCoordinates[routeCoordinates.length - 1])
            .addTo(map)
            .bindPopup("Endpunkt");

        const animatedMapMarker = L.circleMarker(
            routeCoordinates[0],
            {
                radius: 9,
                weight: 3,
                fillOpacity: 1
            }
        ).addTo(map);

        const routeTrace = {
            type: "scatter3d",
            mode: "lines",
            x: eastValues,
            y: northValues,
            z: displayElevations,
            text: hoverTexts,
            hoverinfo: "text",
            line: {
                width: 8,
                color: elevations,
                colorscale: "Viridis",
                colorbar: {
                    title: "Höhe [m]"
                }
            },
            name: "GPS-Route"
        };

        const startTrace = {
            type: "scatter3d",
            mode: "markers+text",
            x: [eastValues[0]],
            y: [northValues[0]],
            z: [displayElevations[0]],
            text: ["Start"],
            textposition: "top center",
            marker: {
                size: 7
            },
            name: "Startpunkt"
        };

        const endIndex = eastValues.length - 1;

        const endTrace = {
            type: "scatter3d",
            mode: "markers+text",
            x: [eastValues[endIndex]],
            y: [northValues[endIndex]],
            z: [displayElevations[endIndex]],
            text: ["Ende"],
            textposition: "top center",
            marker: {
                size: 7
            },
            name: "Endpunkt"
        };

        const animatedTrace = {
            type: "scatter3d",
            mode: "markers",
            x: [eastValues[0]],
            y: [northValues[0]],
            z: [displayElevations[0]],
            marker: {
                size: 9
            },
            name: "Aktuelle Position"
        };

        const layout = {
            title: "Interaktive 3D-Darstellung der Route",

            scene: {
                xaxis: {
                    title: "Westen ← Entfernung Ost [m] → Osten"
                },

                yaxis: {
                    title: "Süden ← Entfernung Nord [m] → Norden"
                },

                zaxis: {
                    title: "Höhenunterschied, " +
                           verticalExaggeration +
                           "× überhöht"
                },

                aspectmode: "manual",

                aspectratio: {
                    x: 1.5,
                    y: 1.5,
                    z: 0.8
                },

                camera: {
                    eye: {
                        x: 1.5,
                        y: 1.5,
                        z: 1.0
                    }
                }
            },

            margin: {
                l: 0,
                r: 0,
                b: 0,
                t: 50
            },

            legend: {
                x: 0,
                y: 1
            }
        };

        Plotly.newPlot(
            "route3d",
            [
                routeTrace,
                startTrace,
                endTrace,
                animatedTrace
            ],
            layout,
            {
                responsive: true
            }
        );

        let animationIndex = 0;
        let animationTimer = null;

        function updateAnimatedPosition() {
            if (animationIndex >= latitudes.length) {
                stopAnimation();
                return;
            }

            animatedMapMarker.setLatLng([
                latitudes[animationIndex],
                longitudes[animationIndex]
            ]);

            Plotly.restyle(
                "route3d",
                {
                    x: [[eastValues[animationIndex]]],
                    y: [[northValues[animationIndex]]],
                    z: [[displayElevations[animationIndex]]]
                },
                [3]
            );

            animationIndex += 1;
        }

        function startAnimation() {
            if (animationTimer !== null) {
                return;
            }

            animationTimer = setInterval(
                updateAnimatedPosition,
                100
            );
        }

        function stopAnimation() {
            if (animationTimer !== null) {
                clearInterval(animationTimer);
                animationTimer = null;
            }
        }

        function resetAnimation() {
            stopAnimation();

            animationIndex = 0;

            animatedMapMarker.setLatLng([
                latitudes[0],
                longitudes[0]
            ]);

            Plotly.restyle(
                "route3d",
                {
                    x: [[eastValues[0]]],
                    y: [[northValues[0]]],
                    z: [[displayElevations[0]]]
                },
                [3]
            );
        }
